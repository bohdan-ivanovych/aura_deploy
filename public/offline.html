<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Aura — No Signal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #060D1F;
      --fg: #E2EBF6;
      --fg-muted: rgba(226,235,246,0.55);
      --accent: #00d4d4;
      --accent-dim: rgba(0,212,212,0.15);
      --accent-border: rgba(0,212,212,0.3);
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --radius: 20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,212,212,0.06) 0%, transparent 60%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px 36px;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.2;
      margin-bottom: 10px;
      color: var(--fg);
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--fg-muted);
      margin-bottom: 28px;
      max-width: 260px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #00d4d4 0%, #0098db 100%);
      color: #000;
      text-decoration: none;
      transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      box-shadow: 0 4px 20px rgba(0,212,212,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(0,212,212,0.45);
    }
    .btn-primary:active {
      transform: scale(0.97);
      filter: brightness(0.9);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,212,0.2), transparent);
      margin: 24px 0;
    }

    .hint {
      font-size: 13px;
      color: var(--fg-muted);
      line-height: 1.5;
    }

    /* Animated signal bars */
    .signal {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .signal-bar {
      width: 4px;
      border-radius: 2px;
      background: rgba(0,212,212,0.2);
    }
    .signal-bar:nth-child(1) { height: 8px; }
    .signal-bar:nth-child(2) { height: 14px; }
    .signal-bar:nth-child(3) { height: 20px; }
    .signal-bar:nth-child(4) { height: 26px; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="signal" aria-hidden="true">
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
      <div class="signal-bar"></div>
    </div>

    <p class="label">No signal</p>
    <h1>Offline</h1>
    <p>You're out of range. Your saved flashcards and recent sessions are still available.</p>

    <a href="/" class="btn-primary" onclick="location.reload(); return false;">
      ↻ Try again
    </a>

    <div class="divider"></div>
    <p class="hint">Tip: Your flashcards work offline. Check your connection and try again.</p>
  </div>
</body>
</html>
